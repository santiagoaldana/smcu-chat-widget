<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMCU Contact Center Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Floating bubble ── */
    #smcu-bubble {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #1B3A5C;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: transform 0.2s;
    }
    #smcu-bubble:hover { transform: scale(1.08); }
    #smcu-bubble svg { width: 28px; height: 28px; fill: #fff; }

    /* ── Chat panel ── */
    #smcu-panel {
      position: fixed;
      bottom: 96px;
      right: 28px;
      width: 380px;
      max-height: 560px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 9998;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition: opacity 0.2s, transform 0.2s;
    }
    #smcu-panel.open {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    /* Header */
    #smcu-header {
      background: #1B3A5C;
      color: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #smcu-header .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #5BB8D4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      flex-shrink: 0;
    }
    #smcu-header .info { flex: 1; }
    #smcu-header .name { font-weight: 600; font-size: 15px; }
    #smcu-header .status { font-size: 12px; opacity: 0.75; margin-top: 1px; }
    #smcu-close {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      opacity: 0.7;
      font-size: 20px;
      line-height: 1;
      padding: 4px;
    }
    #smcu-close:hover { opacity: 1; }

    /* Messages */
    #smcu-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #F4F6F9;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 85%;
      line-height: 1.5;
    }
    .msg.bot {
      align-self: flex-start;
    }
    .msg.user {
      align-self: flex-end;
    }
    .msg .bubble {
      padding: 10px 14px;
      border-radius: 14px;
    }
    .msg.bot .bubble {
      background: #fff;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .msg.user .bubble {
      background: #1B3A5C;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Sources */
    .sources-toggle {
      margin-top: 6px;
      font-size: 12px;
      color: #5BB8D4;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      user-select: none;
    }
    .sources-toggle:hover { color: #1B3A5C; }
    .sources-list {
      display: none;
      margin-top: 6px;
      padding: 8px 10px;
      background: #eef2f7;
      border-radius: 8px;
      font-size: 12px;
    }
    .sources-list.visible { display: block; }
    .sources-list a {
      display: block;
      color: #1B3A5C;
      text-decoration: none;
      margin-bottom: 4px;
      word-break: break-all;
    }
    .sources-list a:hover { text-decoration: underline; }
    .sources-list a:last-child { margin-bottom: 0; }

    /* Typing indicator */
    .typing .bubble {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 12px 16px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #5BB8D4;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    #smcu-input-area {
      padding: 12px 14px;
      background: #fff;
      border-top: 1px solid #e5e9ef;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #smcu-input {
      flex: 1;
      border: 1.5px solid #d0d7e2;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 100px;
      line-height: 1.4;
      font-family: inherit;
      color: #1a1a1a;
    }
    #smcu-input:focus { border-color: #5BB8D4; }
    #smcu-send {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: #5BB8D4;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #smcu-send:hover { background: #1B3A5C; }
    #smcu-send svg { width: 18px; height: 18px; fill: #fff; }
    #smcu-send:disabled { background: #c5d0dc; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- ══ CONFIG — edit these two lines ══ -->
<script>
  const ENDPOINT_URL = "/chat";
  const DATABRICKS_TOKEN = ""; // token handled server-side by proxy.py
</script>
<!-- ════════════════════════════════════ -->

<!-- Bubble -->
<div id="smcu-bubble" onclick="togglePanel()" title="Ask SMCU Assistant">
  <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/></svg>
</div>

<!-- Panel -->
<div id="smcu-panel">
  <div id="smcu-header">
    <div class="avatar">S</div>
    <div class="info">
      <div class="name">SMCU Assistant</div>
      <div class="status">Ask me about products &amp; services</div>
    </div>
    <button id="smcu-close" onclick="togglePanel()" title="Close">✕</button>
  </div>

  <div id="smcu-messages">
    <!-- welcome message injected by JS -->
  </div>

  <div id="smcu-input-area">
    <textarea id="smcu-input" rows="1" placeholder="Ask a question…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="smcu-send" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const panel = document.getElementById('smcu-panel');
  const messagesEl = document.getElementById('smcu-messages');
  const inputEl = document.getElementById('smcu-input');
  const sendBtn = document.getElementById('smcu-send');
  let isOpen = false;

  // Welcome message
  addBotMessage("Hi! I'm the SMCU Assistant. Ask me anything about our products, services, or rates.");

  function togglePanel() {
    isOpen = !isOpen;
    panel.classList.toggle('open', isOpen);
    if (isOpen) setTimeout(() => inputEl.focus(), 200);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    addUserMessage(text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    const typingEl = addTyping();

    try {
      const res = await fetch(ENDPOINT_URL, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${DATABRICKS_TOKEN}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ dataframe_records: [{ question: text }] })
      });

      const data = await res.json();
      typingEl.remove();

      // Parse response — agent returns predictions array
      const predictions = data.predictions ?? data;
      const pred = Array.isArray(predictions) ? predictions[0] : predictions;
      const answer = pred?.answer ?? pred?.output ?? "I couldn't get an answer. Please try again.";
      const sources = pred?.sources ?? [];

      addBotMessage(answer, sources);

    } catch (err) {
      typingEl.remove();
      addBotMessage("Sorry, I'm having trouble connecting. Please try again in a moment.");
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function addUserMessage(text) {
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function addBotMessage(text, sources = []) {
    const div = document.createElement('div');
    div.className = 'msg bot';

    let sourcesHtml = '';
    if (sources.length > 0) {
      const links = sources.map(s => `<a href="${escHtml(s)}" target="_blank" rel="noopener">${escHtml(s)}</a>`).join('');
      sourcesHtml = `
        <div class="sources-toggle" onclick="toggleSources(this)">
          <span>▶</span> Sources (${sources.length})
        </div>
        <div class="sources-list">${links}</div>`;
    }

    div.innerHTML = `<div class="bubble">${escHtml(text)}</div>${sourcesHtml}`;
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function toggleSources(el) {
    const list = el.nextElementSibling;
    const arrow = el.querySelector('span');
    list.classList.toggle('visible');
    arrow.textContent = list.classList.contains('visible') ? '▼' : '▶';
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot typing';
    div.innerHTML = `<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
